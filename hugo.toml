baseURL = "https://blog.advanx.com.br/"
languageCode = "pt-BR"
title = "Blog Advanx — IA e Captação para Advogados"
theme = "PaperMod"
[pagination]
  pagerSize = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
enableEmoji = true

[params]
  env = "production"
  title = "Blog Advanx"
  description = "Estratégias, ferramentas e cases reais de IA, captação de clientes e automação jurídica para advogados e escritórios de advocacia."
  author = "Advanx Tecnologia"
  DateFormat = "2 January 2006"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  UseHugoToc = true
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

[params.homeInfoParams]
  Title = "Blog Advanx — IA para Advogados"
  Content = "Estratégias práticas de **inteligência artificial**, **captação de clientes** e **automação** para escritórios de advocacia modernos."

[[params.socialIcons]]
  name = "Website"
  url = "https://advanx.com.br"

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    name = "Início"
    url = "/"
    weight = 10
  [[menu.main]]
    name = "Artigos"
    url = "/posts/"
    weight = 20
  [[menu.main]]
    name = "Tópicos"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    name = "Advanx.com.br"
    url = "https://advanx.com.br"
    weight = 40
